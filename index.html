<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Surprise</title>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&amp;family=Outfit:wght@200;300;400;500;600&amp;display=swap" rel="stylesheet">
  <style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;width:100%;overflow:hidden}
  body{font-family:'Outfit',sans-serif;background:#000;color:#e0e0e0}
  .app-root{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;position:relative}
  .screen{display:none;width:100%;min-height:100%;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;position:absolute;top:0;left:0}
  .screen.active{display:flex}
  .fade-in{animation:fadeIn .8s ease forwards}
  .fade-out{animation:fadeOut .5s ease forwards}
  @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeOut{from{opacity:1}to{opacity:0}}
  @keyframes pulse{0%,100%{text-shadow:0 0 20px var(--glow),0 0 40px var(--glow)}50%{text-shadow:0 0 30px var(--glow),0 0 60px var(--glow),0 0 80px var(--glow)}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .glow-text{--glow:#4a9eff;animation:pulse 3s ease-in-out infinite;color:#fff}
  .glow-blue{--glow:#4a9eff}
  .glow-pink{--glow:#ff6baa}
  .glow-gold{--glow:#ffd700}
  .serif{font-family:'Cormorant Garamond',serif}
  .tap-hint{font-size:.85rem;opacity:.4;margin-top:2rem;animation:float 2.5s ease-in-out infinite}
  .mood-btn{background:rgba(74,158,255,.08);border:1px solid rgba(74,158,255,.25);color:#b0d4ff;padding:.9rem 2.2rem;border-radius:50px;font-size:1.05rem;font-family:'Outfit',sans-serif;cursor:pointer;transition:all .35s ease;margin:.45rem;min-width:130px}
  .mood-btn:hover,.mood-btn:focus{background:rgba(74,158,255,.2);border-color:rgba(74,158,255,.6);box-shadow:0 0 25px rgba(74,158,255,.25);transform:scale(1.05);outline:none}
  .gift-box{width:110px;height:110px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:2.2rem;cursor:pointer;transition:all .4s ease;border:1px solid rgba(74,158,255,.2);background:rgba(74,158,255,.06);position:relative;overflow:hidden}
  .gift-box:hover{transform:scale(1.08);box-shadow:0 0 30px rgba(74,158,255,.2)}
  .gift-box.opened{border-color:rgba(255,107,170,.4);background:rgba(255,107,170,.08)}
  .gift-box.opened .gift-icon{display:none}
  .gift-box .gift-msg{display:none;font-size:.78rem;padding:.5rem;line-height:1.4;color:#e8c4d8}
  .gift-box.opened .gift-msg{display:flex;align-items:center;justify-content:center;text-align:center;height:100%}
  #heartCanvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
  .sparkle{position:absolute;width:4px;height:4px;border-radius:50%;background:#4a9eff;animation:sparkleAnim 1.5s ease forwards;pointer-events:none}
  @keyframes sparkleAnim{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0) translateY(-30px)}}
  .step-text{font-size:1.6rem;opacity:0;transition:opacity .6s}
  .step-text.show{opacity:1}
  .final-name{font-size:2.8rem;font-weight:300;line-height:1.2}
  @media(max-width:500px){.final-name{font-size:2rem}.gift-box{width:90px;height:90px;font-size:1.8rem}}
</style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="https://cdn.tailwindcss.com/3.4.17" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body>
  <div class="app-root" id="appRoot"><!-- Screen 1: Intro -->
   <div class="screen active" id="screenIntro">
    <h1 class="serif glow-text glow-blue" style="font-size:2.4rem;font-weight:300;letter-spacing:.02em" id="introHeading">I made this for you…</h1>
    <p class="tap-hint" id="introTap">Tap to begin</p>
   </div><!-- Screen 2: Mood -->
   <div class="screen" id="screenMood">
    <p style="font-size:1.1rem;opacity:.5;margin-bottom:.8rem;letter-spacing:.1em;text-transform:uppercase;font-size:.75rem">tell me</p>
    <h2 class="serif" style="font-size:2rem;font-weight:300;margin-bottom:2rem;color:#fff">How are you feeling?</h2>
    <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:.3rem" id="moodBtns"><button class="mood-btn" data-mood="happy">😊 Happy</button> <button class="mood-btn" data-mood="sad">😢 Sad</button> <button class="mood-btn" data-mood="stressed">😤 Stressed</button>
    </div>
   </div><!-- Screen 3: Questions -->
   <div class="screen" id="screenQuestions">
    <p style="opacity:.4;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1.5rem" id="qLabel">question</p>
    <h2 class="serif" style="font-size:1.8rem;font-weight:300;color:#fff;max-width:500px" id="qText"></h2>
    <div id="qAnswer" style="margin-top:2rem;font-size:2rem;opacity:0;transition:all .6s ease;transform:translateY(10px)"></div>
    <p class="tap-hint" id="qTap">Tap to reveal</p>
   </div><!-- Screen 4: Gifts -->
   <div class="screen" id="screenGifts">
    <p style="opacity:.4;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.6rem">surprises</p>
    <h2 class="serif" style="font-size:1.8rem;font-weight:300;color:#fff;margin-bottom:2rem">Open your gifts 🎁</h2>
    <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:1rem" id="giftGrid"></div>
    <p class="tap-hint" style="margin-top:2.5rem" id="giftHint">Tap each box</p>
   </div><!-- Screen 5: Suspense -->
   <div class="screen" id="screenSuspense">
    <div style="display:flex;flex-direction:column;gap:1.5rem;align-items:center">
     <p class="step-text serif" style="font-size:1.6rem;font-weight:300;color:#8ab4f8" id="s1">Wait…</p>
     <p class="step-text serif" style="font-size:1.8rem;font-weight:300;color:#c4a0e8" id="s2">One more thing…</p>
     <p class="step-text serif glow-text glow-pink" style="font-size:2rem;font-weight:400" id="s3">This is important…</p>
    </div>
   </div><!-- Screen 6: Heart -->
   <div class="screen" id="screenHeart">
    <canvas id="heartCanvas"></canvas>
   </div><!-- Screen 7: Final -->
   <div class="screen" id="screenFinal">
    <p class="serif glow-text glow-gold final-name" id="finalName">You Are My Favourite Person</p>
    <p style="margin-top:1rem;font-size:1.1rem;opacity:.7;max-width:400px" id="finalMsg">You deserve the world</p>
    <p style="margin-top:3rem;font-size:.75rem;opacity:.25">made with 💙</p>
   </div>
  </div>
  <script>
(function(){
  const defaultConfig = {
    recipient_name: "You",
    final_message: "You deserve the world",
    intro_text: "I made this for you…",
    bg_color: "#000000",
    glow_color: "#4a9eff",
    accent_color: "#ff6baa",
    text_color: "#e0e0e0",
    font_family: "Outfit"
  };

  let mood = "happy";
  let currentScreen = "screenIntro";
  let qIndex = 0;
  let qRevealed = false;
  let giftOpened = 0;
  let heartAnimDone = false;
  let audioCtx = null;

  const questions = {
    happy: [
      {q:"Who lights up every room they walk into?", a:"YOU 💙"},
      {q:"Who has the most amazing smile?", a:"Definitely YOU ✨"},
      {q:"Who deserves all the happiness in the world?", a:"YOU, always 💫"}
    ],
    sad: [
      {q:"Who is stronger than they think?", a:"YOU 💙"},
      {q:"Who deserves a thousand hugs right now?", a:"YOU, come here 🤗"},
      {q:"Who is going to be just fine?", a:"YOU, I promise ✨"}
    ],
    stressed: [
      {q:"Who needs to take a deep breath?", a:"YOU — breathe 💙"},
      {q:"Who works way too hard but is amazing?", a:"YOU, obviously ✨"},
      {q:"Who deserves a break and a million compliments?", a:"YOU 💫"}
    ]
  };

  const gifts = [
    {icon:"🌟",msg:"You make ordinary moments extraordinary"},
    {icon:"🎵",msg:"If you were a song, you'd be everyone's favorite"},
    {icon:"🔮",msg:"Your future is brighter than you know"},
    {icon:"🦋",msg:"You've grown so beautifully — keep going"},
    {icon:"💌",msg:"Someone is so grateful you exist. That someone is me."}
  ];

  function playTone(){
    try{
      if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.connect(g);g.connect(audioCtx.destination);
      o.type='sine';o.frequency.setValueAtTime(520+Math.random()*200,audioCtx.currentTime);
      g.gain.setValueAtTime(0.08,audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);
      o.start();o.stop(audioCtx.currentTime+0.4);
    }catch(e){}
  }

  function goScreen(id){
    const cur=document.getElementById(currentScreen);
    const nxt=document.getElementById(id);
    cur.classList.add('fade-out');
    setTimeout(()=>{
      cur.classList.remove('active','fade-out','fade-in');
      nxt.classList.add('active','fade-in');
      currentScreen=id;
      if(id==='screenQuestions') showQuestion();
      if(id==='screenSuspense') runSuspense();
      if(id==='screenHeart') runHeart();
    },400);
  }

  // Intro tap
  document.getElementById('screenIntro').addEventListener('click',()=>{
    playTone();goScreen('screenMood');
  });

  // Mood
  document.getElementById('moodBtns').addEventListener('click',(e)=>{
    const btn=e.target.closest('.mood-btn');
    if(!btn)return;
    mood=btn.dataset.mood;
    playTone();
    qIndex=0;qRevealed=false;
    goScreen('screenQuestions');
  });

  // Questions
  function showQuestion(){
    const qs=questions[mood];
    if(qIndex>=qs.length){goScreen('screenGifts');return;}
    const el=document.getElementById('qText');
    const ans=document.getElementById('qAnswer');
    const tap=document.getElementById('qTap');
    el.textContent=qs[qIndex].q;
    ans.style.opacity='0';ans.style.transform='translateY(10px)';
    tap.style.opacity='.4';
    qRevealed=false;
  }
  document.getElementById('screenQuestions').addEventListener('click',()=>{
    if(!qRevealed){
      const qs=questions[mood];
      const ans=document.getElementById('qAnswer');
      ans.textContent=qs[qIndex].a;
      ans.style.opacity='1';ans.style.transform='translateY(0)';
      document.getElementById('qTap').style.opacity='0';
      qRevealed=true;playTone();
    } else {
      qIndex++;qRevealed=false;showQuestion();
    }
  });

  // Gifts
  function buildGifts(){
    const grid=document.getElementById('giftGrid');
    grid.innerHTML='';giftOpened=0;
    gifts.forEach((g,i)=>{
      const box=document.createElement('div');
      box.className='gift-box';
      box.innerHTML=`<span class="gift-icon">${g.icon}</span><span class="gift-msg">${g.msg}</span>`;
      box.addEventListener('click',()=>{
        if(!box.classList.contains('opened')){
          box.classList.add('opened');playTone();giftOpened++;
          if(giftOpened>=gifts.length){
            setTimeout(()=>goScreen('screenSuspense'),1200);
          }
        }
      });
      box.style.animationDelay=i*0.1+'s';
      grid.appendChild(box);
    });
  }

  // Suspense
  function runSuspense(){
    const s1=document.getElementById('s1'),s2=document.getElementById('s2'),s3=document.getElementById('s3');
    s1.classList.remove('show');s2.classList.remove('show');s3.classList.remove('show');
    setTimeout(()=>{s1.classList.add('show');playTone()},600);
    setTimeout(()=>{s2.classList.add('show');playTone()},2200);
    setTimeout(()=>{s3.classList.add('show');playTone()},4000);
    setTimeout(()=>goScreen('screenHeart'),6000);
  }

  // Heart canvas
  function runHeart(){
    const canvas=document.getElementById('heartCanvas');
    const ctx=canvas.getContext('2d');
    const dpr=window.devicePixelRatio||1;
    const rect=canvas.parentElement.getBoundingClientRect();
    canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
    canvas.style.width=rect.width+'px';canvas.style.height=rect.height+'px';
    ctx.scale(dpr,dpr);
    const W=rect.width,H=rect.height;
    const particles=[];
    const heartPts=[];
    // generate heart shape points
    for(let a=0;a<Math.PI*2;a+=0.06){
      const x=16*Math.pow(Math.sin(a),3);
      const y=-(13*Math.cos(a)-5*Math.cos(2*a)-2*Math.cos(3*a)-Math.cos(4*a));
      heartPts.push({x:x*Math.min(W,H)*0.025+W/2, y:y*Math.min(W,H)*0.025+H/2});
    }
    const N=heartPts.length*3;
    for(let i=0;i<N;i++){
      const hp=heartPts[i%heartPts.length];
      particles.push({
        x:W/2+(Math.random()-.5)*W,
        y:H/2+(Math.random()-.5)*H,
        tx:hp.x+(Math.random()-.5)*8,
        ty:hp.y+(Math.random()-.5)*8,
        size:1.5+Math.random()*2,
        hue:200+Math.random()*40,
        delay:Math.random()*60
      });
    }
    let frame=0;
    function animate(){
      ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(0,0,W,H);
      let settled=0;
      particles.forEach(p=>{
        if(frame>p.delay){
          p.x+=(p.tx-p.x)*0.04;
          p.y+=(p.ty-p.y)*0.04;
          if(Math.abs(p.x-p.tx)<1&&Math.abs(p.y-p.ty)<1)settled++;
        }
        const alpha=frame>p.delay?Math.min(1,(frame-p.delay)/30):0;
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle=`hsla(${p.hue},80%,70%,${alpha})`;
        ctx.shadowColor=`hsla(${p.hue},90%,60%,${alpha*0.6})`;
        ctx.shadowBlur=10;
        ctx.fill();ctx.shadowBlur=0;
      });
      frame++;
      if(settled>N*0.9&&!heartAnimDone){
        heartAnimDone=true;
        setTimeout(()=>goScreen('screenFinal'),1500);
      }
      if(!heartAnimDone)requestAnimationFrame(animate);
    }
    animate();
  }

  // Apply config
  function applyConfig(config){
    const c=config;
    const name=c.recipient_name||defaultConfig.recipient_name;
    const msg=c.final_message||defaultConfig.final_message;
    const intro=c.intro_text||defaultConfig.intro_text;
    const bg=c.bg_color||defaultConfig.bg_color;
    const glow=c.glow_color||defaultConfig.glow_color;
    const accent=c.accent_color||defaultConfig.accent_color;
    const txt=c.text_color||defaultConfig.text_color;
    const font=c.font_family||defaultConfig.font_family;

    document.getElementById('introHeading').textContent=intro;
    document.getElementById('finalName').innerHTML=`Happy Birthday ${name} 💙`;
    document.getElementById('finalMsg').textContent=msg;
    document.body.style.background=bg;
    document.body.style.color=txt;
    document.body.style.fontFamily=`${font}, Outfit, sans-serif`;

    document.documentElement.style.setProperty('--glow-main',glow);
    // Update glow classes inline
    document.querySelectorAll('.glow-blue').forEach(el=>el.style.setProperty('--glow',glow));
    document.querySelectorAll('.glow-pink').forEach(el=>el.style.setProperty('--glow',accent));
    document.querySelectorAll('.mood-btn').forEach(btn=>{
      btn.style.borderColor=glow+'40';btn.style.color=txt;
    });
    document.querySelectorAll('.gift-box').forEach(b=>{
      if(!b.classList.contains('opened'))b.style.borderColor=glow+'33';
    });
  }

  buildGifts();

  window.elementSdk.init({
    defaultConfig,
    onConfigChange:async(config)=>applyConfig(config),
    mapToCapabilities:(config)=>({
      recolorables:[
        {get:()=>config.bg_color||defaultConfig.bg_color,set:v=>{config.bg_color=v;window.elementSdk.setConfig({bg_color:v})}},
        {get:()=>config.text_color||defaultConfig.text_color,set:v=>{config.text_color=v;window.elementSdk.setConfig({text_color:v})}},
        {get:()=>config.glow_color||defaultConfig.glow_color,set:v=>{config.glow_color=v;window.elementSdk.setConfig({glow_color:v})}},
        {get:()=>config.accent_color||defaultConfig.accent_color,set:v=>{config.accent_color=v;window.elementSdk.setConfig({accent_color:v})}}
      ],
      borderables:[],
      fontEditable:{get:()=>config.font_family||defaultConfig.font_family,set:v=>{config.font_family=v;window.elementSdk.setConfig({font_family:v})}},
      fontSizeable:undefined
    }),
    mapToEditPanelValues:(config)=>new Map([
      ["recipient_name",config.recipient_name||defaultConfig.recipient_name],
      ["final_message",config.final_message||defaultConfig.final_message],
      ["intro_text",config.intro_text||defaultConfig.intro_text]
    ])
  });
})();
</script>
