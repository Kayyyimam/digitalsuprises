<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>

<style>
  body {
    margin: 0;
    background: #000;
    color: #d7ecff;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  .container, .final-screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    flex-direction: column;
    transition: opacity 1.5s ease;
  }

  .spotlight {
    position: absolute;
    width: 360px;
    height: 360px;
    background: radial-gradient(circle, rgba(120,180,255,0.14), transparent 70%);
    border-radius: 50%;
    animation: glow 7s ease-in-out infinite alternate;
  }

  @keyframes glow {
    from { transform: scale(1); opacity: 0.45; }
    to { transform: scale(1.25); opacity: 0.9; }
  }

  .line {
    font-size: 1.35rem;
    margin: 10px 0;
    min-height: 24px;
  }

  .main {
    font-size: 2.1rem;
    font-weight: 600;
    margin-top: 20px;
    color: #ffffff;
    text-shadow: 0 0 14px #6fb3ff;
    min-height: 40px;
  }

  /* FINAL SCREEN */
  .final-screen {
    display: none;
    transform: scale(1);
  }

  .final-text {
    font-size: 2.5rem;
    color: #ffffff;
    text-shadow: 0 0 18px #6fb3ff;
    opacity: 0;
    position: relative;
    z-index: 2;
  }

  .sub {
    margin-top: 12px;
    font-size: 1.1rem;
    color: #bcdcff;
    opacity: 0;
    position: relative;
    z-index: 2;
  }

  .btn {
    margin-top: 26px;
    padding: 8px 16px;
    font-size: 0.9rem;
    font-weight: 300;
    border: 1px solid rgba(120,180,255,0.4);
    border-radius: 20px;
    background: transparent;
    color: #cfe6ff;
    cursor: pointer;
    opacity: 0.85;
    position: relative;
    z-index: 2;
  }

  /* HEART FIXED */
  .heart {
    position: absolute;
    width: 420px;
    height: 420px;
    opacity: 0.12;
    z-index: 1;
  }

  .heart path {
    fill: none;
    stroke: rgba(120,180,255,0.7);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;

    stroke-dasharray: 2000;
    stroke-dashoffset: 2000;

    animation: drawHeart 5.5s ease forwards;
    filter: drop-shadow(0 0 6px rgba(120,180,255,0.25));
  }

  @keyframes drawHeart {
    to { stroke-dashoffset: 0; }
  }

</style>
</head>

<body>

<!-- SCENE 1 -->
<div class="container" id="scene1">
  <div class="spotlight"></div>

  <div class="line" id="l1"></div>
  <div class="line" id="l2"></div>
  <div class="line" id="l3"></div>

  <div class="main" id="mainText"></div>
</div>

<!-- SCENE 2 -->
<div class="final-screen" id="scene2">

  <!-- HEART -->
  <svg class="heart" viewBox="0 0 512 512" preserveAspectRatio="xMidYMid meet">
    <path d="M256 464s-184-112-224-272C-8 120 72 32 160 32c48 0 88 32 96 48
             8-16 48-48 96-48 88 0 168 88 128 160-40 160-224 272-224 272z"/>
  </svg>

  <div class="spotlight"></div>

  <div class="final-text" id="finalText">
    You are the best husband in the world.
  </div>

  <div class="sub" id="subText">
    Not because of what you do… but because of who you are.
  </div>

  <button class="btn" onclick="restart()">Again</button>
</div>

<script>
const lines = [
  "You carry more than you ever say",
  "You stay strong even when you're tired",
  "And still manage to be my peace"
];

const mainMessage = "Thank you for everything you are.";

let timeout;

function type(el, text, speed, done) {
  let i = 0;
  el.textContent = "";

  function step() {
    el.textContent += text[i];
    i++;

    if (i < text.length) {
      setTimeout(step, speed);
    } else {
      setTimeout(done, 800);
    }
  }

  step();
}

function run() {
  clearTimeout(timeout);

  const scene1 = document.getElementById("scene1");
  const scene2 = document.getElementById("scene2");

  scene1.style.display = "flex";
  scene2.style.display = "none";
  scene1.style.opacity = 1;

  const l1 = document.getElementById("l1");
  const l2 = document.getElementById("l2");
  const l3 = document.getElementById("l3");
  const main = document.getElementById("mainText");

  type(l1, lines[0], 55, () => {
    type(l2, lines[1], 40, () => {
      type(l3, lines[2], 40, () => {
        type(main, mainMessage, 65, () => {

          // emotional pause (silence)
          timeout = setTimeout(() => {

            scene1.style.opacity = 0;

            setTimeout(() => {
              scene1.style.display = "none";
              scene2.style.display = "flex";

              // cinematic reveal
              scene2.style.transform = "scale(0.98)";
              setTimeout(() => {
                scene2.style.transition = "transform 3s ease, opacity 1.5s ease";
                scene2.style.transform = "scale(1.04)";
              }, 200);

              // text reveal
              setTimeout(() => {
                document.getElementById("finalText").style.opacity = 1;
                document.getElementById("finalText").style.transition = "2s";
              }, 900);

              setTimeout(() => {
                document.getElementById("subText").style.opacity = 1;
                document.getElementById("subText").style.transition = "2s";
              }, 1700);

            }, 1200);

          }, 1200);

        });
      });
    });
  });
}

function restart() {
  run();
}

run();
</script>

</body>
</html>
