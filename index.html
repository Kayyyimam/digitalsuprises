<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry</title>

<style>
  body {
    margin: 0;
    background: #0a0a0a;
    font-family: Arial, sans-serif;
    overflow: hidden;
    color: #e8e8e8;
  }

  /* soft glow background */
  body::before {
    content: "";
    position: absolute;
    inset: -10%;
    background: radial-gradient(circle, rgba(255,255,255,0.04), transparent 65%);
    animation: breathe 8s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.35; }
    50% { transform: scale(1.05); opacity: 0.6; }
  }

  /* SCREEN */
  .screen {
    position: absolute;
    width: 100%;
    height: 100%;
  }

  /* LETTER WRAPPER (mobile-safe centering) */
  .letter {
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 24px;
  }

  /* RESPONSIVE TEXT (IMPORTANT FIX) */
  .text {
    font-size: clamp(1rem, 4.5vw, 1.4rem);
    max-width: 90%;
    line-height: 1.9;
    color: #d8d8d8;
    transition: transform 1s ease;
    word-wrap: break-word;
  }

  .cursor {
    display: inline-block;
    width: 6px;
    height: 16px;
    background: #d8d8d8;
    margin-left: 4px;
    animation: blink 0.9s infinite;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  .divider {
    width: 80px;
    height: 1px;
    background: rgba(255,255,255,0.12);
    margin: 24px 0;
  }

  /* FINAL SCREEN (FIXED CENTERING) */
  .final {
    position: absolute;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
  }

  .final-text {
    font-size: clamp(1.8rem, 7vw, 2.8rem);
    font-weight: 600;
    color: #ff6b6b;
    opacity: 0;
    transform: scale(0.92);
    transition: all 2s ease;
    max-width: 90%;
    line-height: 1.4;
  }

  .show {
    opacity: 1;
    transform: scale(1);
  }

</style>
</head>

<body>

<div class="screen" id="screen1">

  <div class="letter">
    <div class="text" id="text"></div>
    <div class="divider"></div>
  </div>

</div>

<div class="final" id="screen2">
  <div class="final-text" id="finalText">
    I’m really sorry baby.<br>
    Please forgive me.
  </div>
</div>

<script>

const lines = [
  "I’ve taken time to think about everything properly…",
  "and I want to be honest with you.",
  "I understand now that my actions affected you more than I realised.",
  "and I regret that deeply.",
  "You didn’t deserve that from me."
];

let i = 0;
let char = 0;
let current = "";
const textEl = document.getElementById("text");

function type() {
  if (i >= lines.length) {
    setTimeout(showFinal, 1400);
    return;
  }

  if (char < lines[i].length) {
    current += lines[i][char];
    textEl.innerHTML = current + '<span class="cursor"></span>';
    char++;
    setTimeout(type, 45);
  } else {
    current += "<br><br>";
    i++;
    char = 0;
    setTimeout(type, 1100);
  }
}

function showFinal() {
  document.getElementById("screen1").style.opacity = 0;

  setTimeout(() => {
    document.getElementById("screen1").style.display = "none";
    const final = document.getElementById("screen2");
    final.style.display = "flex";

    setTimeout(() => {
      document.getElementById("finalText").classList.add("show");
    }, 600);

  }, 1000);
}

type();

</script>

</body>
</html>
