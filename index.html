<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mama Appreciation</title>

<style>
  body {
    margin: 0;
    background: #ffffff;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  /* soft glow */
  body::before {
    content: "";
    position: absolute;
    inset: -10%;
    background: radial-gradient(circle, rgba(255,0,0,0.05), transparent 60%);
    animation: breathe 6s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.05); opacity: 1; }
  }

  /* MAIN LAYOUT (BALANCED SPACING) */
  .screen {
    position: absolute;
    width: 100%;
    height: 100%;

    display: flex;
    flex-direction: column;
    justify-content: space-evenly; /* 🔥 key fix */

    padding: 8vh 6vw;
    box-sizing: border-box;
  }

  /* ROWS */
  .row {
    display: flex;
    justify-content: space-between;
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    gap: 40px;
  }

  /* CENTER */
  .center {
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .mama {
    font-size: clamp(2.2rem, 8vw, 4rem);
    font-weight: 800;
    color: #cc0000;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-shadow: 0 0 18px rgba(204,0,0,0.25);
    text-align: center;
    position: relative;
  }

  .mama::after {
    content: "";
    position: absolute;
    width: 60%;
    height: 3px;
    background: rgba(204,0,0,0.4);
    bottom: -10px;
    left: 20%;
    border-radius: 5px;
  }

  /* MESSAGES */
  .msg {
    font-size: clamp(0.9rem, 3.5vw, 1.05rem);
    max-width: 45%;
    opacity: 0;
    transform: translateY(10px);
    transition: all 1.2s ease;
    color: #b30000;
    line-height: 1.5;
  }

  .show {
    opacity: 1;
    transform: translateY(0);
  }

  .heart {
    display: inline-block;
    margin-left: 4px;
    animation: float 2s ease-in-out infinite;
  }

  @keyframes float {
    0% { transform: translateY(0) scale(1); opacity: 0.6; }
    50% { transform: translateY(-6px) scale(1.15); opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 0.6; }
  }

  /* FINAL */
  .final {
    position: absolute;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
  }

  .final-text {
    font-size: clamp(1.8rem, 7vw, 3rem);
    font-weight: 800;
    color: #cc0000;
    opacity: 0;
    transform: scale(0.9);
    transition: all 1.5s ease;
  }

  .final-sub {
    margin-top: 10px;
    font-size: clamp(0.9rem, 4vw, 1.1rem);
    color: #a30000;
    opacity: 0;
    transition: all 1.5s ease;
  }

  .show-final {
    opacity: 1;
    transform: scale(1);
  }

  /* 📱 MOBILE */
  @media (max-width: 768px) {

    .screen {
      justify-content: space-around; /* 🔥 balanced mobile spacing */
      padding: 6vh 5vw;
    }

    .row {
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .msg {
      max-width: 90%;
      text-align: center;
    }
  }

</style>
</head>

<body>

<div class="screen">

  <!-- TOP -->
  <div class="row">
   <br><br> <div class="msg" id="m1">You are my strength <span class="heart">❤️</span></div><br><br>
    <div class="msg" id="m2">You never gave up on me <span class="heart">❤️</span></div>
  </div>

  <!-- CENTER -->
  <div class="center">
    <div class="mama">Mommyyy</div>
  </div>

  <!-- BOTTOM -->
  <div class="row">
    <div class="msg" id="m3">Your love shaped my life <span class="heart">❤️</span></div><br><br>
    <div class="msg" id="m4">I am forever grateful <span class="heart">❤️</span></div>
  </div>

</div>

<!-- FINAL -->
<div class="final" id="screen2">
  <div class="final-text" id="finalText">I love you soo much ❤️</div>
  <div class="final-sub" id="finalSub">Forever and always.</div>
</div>

<script>

const msgs = ["m1","m2","m3","m4"];
let i = 0;

function showMessages() {
  if (i >= msgs.length) {
    setTimeout(showFinal, 1200);
    return;
  }

  document.getElementById(msgs[i]).classList.add("show");
  i++;

  setTimeout(showMessages, 1400);
}

function showFinal() {
  document.querySelector(".screen").style.opacity = 0;

  setTimeout(() => {
    document.querySelector(".screen").style.display = "none";
    document.getElementById("screen2").style.display = "flex";

    setTimeout(() => {
      document.getElementById("finalText").classList.add("show-final");
      document.getElementById("finalSub").classList.add("show-final");
    }, 500);

  }, 900);
}

showMessages();

</script>

</body>
</html>
