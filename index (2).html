<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>I Love You Umma</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #000;
    font-family: Arial, sans-serif;
  }

  /* subtle soft gradient only (no noise) */
  .bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, rgba(255,20,90,0.08), transparent 60%);
    z-index: 0;
  }

  /* CENTER FOCUS */
  .center {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 3;
    text-align: center;
  }

  /* CLEAN TEXT (high contrast) */
  .title {
    font-size: 2.6rem;
    font-weight: 700;
    color: #ffffff;
    text-shadow: 0 0 10px #ff2d55, 0 0 25px #ff4da6;
    opacity: 0;
    transform: scale(0.9);
    animation: popIn 2.2s ease forwards;
  }

  .sub {
    margin-top: 12px;
    font-size: 1rem;
    color: #ff9ac2;
    opacity: 0;
    animation: fadeIn 3s ease forwards;
  }

  @keyframes popIn {
    0% { opacity: 0; transform: scale(0.8); }
    100% { opacity: 1; transform: scale(1); }
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
  }
</style>
</head>

<body>

<div class="bg"></div>

<div class="center">
  <div class="title">I love you Umma </div>
  <div class="sub">Forever and always</div>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

/* HEART SHAPE */
function heart(t) {
  return {
    x: 16 * Math.pow(Math.sin(t), 3),
    y: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))
  };
}

/* PARTICLE */
function Particle(tx, ty) {
  this.x = Math.random() * canvas.width;
  this.y = Math.random() * canvas.height;
  this.tx = tx;
  this.ty = ty;
  this.size = Math.random() * 2 + 1;
  this.speed = 0.04;
}

/* BUILD HEART */
function createHeart() {
  for (let i = 0; i < 240; i++) {
    let t = (i / 240) * Math.PI * 2;
    let p = heart(t);

    let tx = canvas.width / 2 + p.x * 14;
    let ty = canvas.height / 2 + p.y * 14;

    particles.push(new Particle(tx, ty));
  }
}

let time = 0;

/* ANIMATION */
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#ff2d55";

  particles.forEach(p => {
    p.x += (p.tx - p.x) * p.speed;
    p.y += (p.ty - p.y) * p.speed;

    let pulse = 1 + Math.sin(time) * 0.04;

    ctx.beginPath();
    ctx.shadowBlur = 12;
    ctx.shadowColor = "#ff2d55";
    ctx.arc(p.x, p.y, p.size * pulse, 0, Math.PI * 2);
    ctx.fill();
  });

  time += 0.05;
  requestAnimationFrame(animate);
}

createHeart();
animate();
</script>

</body>
</html>
